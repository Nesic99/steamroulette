apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "steam-roulette.name" . }}-backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "steam-roulette.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "steam-roulette.name" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "steam-roulette.name" . }}-backend
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: {{ include "steam-roulette.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: STEAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName }}
                  key: STEAM_API_KEY
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
