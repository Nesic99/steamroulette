# This template only renders if you set steamApiKey in values at deploy time.
# Recommended approach: create the secret manually or via external-secrets instead.
# See README for instructions.
{{- if .Values.steamApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.backend.secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "steam-roulette.labels" . | nindent 4 }}
type: Opaque
stringData:
  STEAM_API_KEY: {{ .Values.steamApiKey | quote }}
{{- end }}
