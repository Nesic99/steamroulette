apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "steam-roulette.name" . }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "steam-roulette.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "steam-roulette.name" . }}-frontend
  template:
    metadata:
      labels:
        app: {{ include "steam-roulette.name" . }}-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: {{ include "steam-roulette.frontendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
