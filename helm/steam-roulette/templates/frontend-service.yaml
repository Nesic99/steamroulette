apiVersion: v1
kind: Service
metadata:
  name: {{ include "steam-roulette.name" . }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "steam-roulette.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: {{ include "steam-roulette.name" . }}-frontend
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.frontend.port }}
  type: ClusterIP
