# Global image settings
image:
  registry: ghcr.io
  # Set to your GitHub username/org, e.g. ghcr.io/yourname
  repository: yourname/steam-roulette
  pullPolicy: IfNotPresent

# Backend
backend:
  image:
    tag: latest
  replicaCount: 1
  port: 5000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  secretName: steam-roulette-secret
  service:
    type: NodePort
    nodePort: 30503   # exposed on every k3s node at this port

# Frontend
frontend:
  image:
    tag: latest
  replicaCount: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  service:
    type: NodePort
    nodePort: 30082   # exposed on every k3s node at this port

# Ingress - disabled, traffic routed via external nginx proxy instead
ingress:
  enabled: false

# Namespace to deploy into
namespace: steam-roulette