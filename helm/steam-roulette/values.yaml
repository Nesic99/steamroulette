# Global image settings
image:
  registry: ghcr.io
  # Set to your GitHub username/org, e.g. ghcr.io/yourname
  repository: nesic99/steam-roulette
  pullPolicy: IfNotPresent

# Backend
backend:
  image:
    tag: latest
    # Override full image if needed: ghcr.io/yourname/steam-roulette-backend:sha-abc123
  replicaCount: 1
  port: 5000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # Name of the k8s Secret that holds STEAM_API_KEY
  # Create with: kubectl create secret generic steam-roulette-secret --from-literal=STEAM_API_KEY=xxxx
  secretName: steam-roulette-secret

# Frontend
frontend:
  image:
    tag: latest
  replicaCount: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Ingress
ingress:
  enabled: true
  className: traefik          # k3s default; change to nginx if using ingress-nginx
  host: steamroulette.nesicdjordje.com  # replace with your actual domain
  tls:
    enabled: false
    secretName: steam-roulette-tls

# Namespace to deploy into
namespace: steam-roulette
